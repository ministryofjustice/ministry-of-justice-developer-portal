repos:
  - repo: https://github.com/ministryofjustice/devsecops-hooks
    rev: 3c4b8f1f6f9d2b5f4a2c3d6e7f8a9b0c1d2e3f4
    hooks:
      - id: baseline
        name: Ministry of Justice - Security scan

  - repo: local
    hooks:
      - id: lint
        name: Lint check
        entry: npm run validate:all
        language: system
        pass_filenames: false

      - id: spellcheck
        name: Spell check
        entry: npm run spellcheck
        language: system
        pass_filenames: false
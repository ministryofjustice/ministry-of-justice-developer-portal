apiVersion: apps/v1
kind: Deployment
metadata:
  name: developer-portal
  namespace: developer-portal-dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: developer-portal
  template:
    metadata:
      labels:
        app: developer-portal
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: developer-portal
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: developer-portal
  namespace: developer-portal-dev
spec:
  selector:
    app: developer-portal
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: developer-portal
  namespace: developer-portal-dev
  annotations:
    external-dns.alpha.kubernetes.io/aws-weight: "100"
    external-dns.alpha.kubernetes.io/set-identifier: "developer-portal-developer-portal-dev-green"
spec:
  ingressClassName: default-non-prod
  rules:
    - host: dev.developer-portal.service.justice.gov.uk
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: developer-portal
                port:
                  number: 80
  tls:
    - hosts:
        - dev.developer-portal.service.justice.gov.uk
      secretName: developer-portal-dev-cert

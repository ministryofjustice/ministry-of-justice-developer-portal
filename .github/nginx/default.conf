server {
  listen 8080;
  server_name _;

  # Behind ingress, avoid emitting absolute redirects that leak internal container port.
  absolute_redirect off;
  port_in_redirect off;

  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  # runtime-config.js must be a real file; do not serve index.html here.
  location = /runtime-config.js {
    try_files $uri =404;
  }

  # Static assets should return 404 when missing instead of HTML fallback.
  location ~* \.(?:js|mjs|css|map|json|svg|ico|png|jpg|jpeg|gif|webp|woff2?|ttf|eot|txt|xml)$ {
    try_files $uri =404;
  }

  location / {
    # Next static export emits /route.html when trailingSlash is false.
    # Try the exported file first, then fall back to directory-style pages and the app shell.
    try_files $uri $uri.html $uri/index.html /index.html;
  }
}

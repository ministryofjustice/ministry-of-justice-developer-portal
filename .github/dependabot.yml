---
# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 3
      semver-major-days: 8
      semver-minor-days: 4
      semver-patch-days: 3
  - package-ecosystem: "terraform"
    directory: "/terraform"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 3
      semver-major-days: 8
      semver-minor-days: 4
      semver-patch-days: 3
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 3
      semver-major-days: 8
      semver-minor-days: 4
      semver-patch-days: 3
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 3
      semver-major-days: 8
      semver-minor-days: 4
      semver-patch-days: 3
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 3
      semver-major-days: 8
      semver-minor-days: 4
      semver-patch-days: 3
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 3
      semver-major-days: 8
      semver-minor-days: 4
      semver-patch-days: 3
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 3
      semver-major-days: 8
      semver-minor-days: 4
      semver-patch-days: 3

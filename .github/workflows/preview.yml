name: Ingest Preview (PR)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  preview-ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.1.0
        with:
          node-version: ${{ vars.NODE_VERSION }} # Set in repo variables (Settings > Secrets and variables > Actions)
          cache: npm

      - name: SLSA supply chain protection
        uses: ministryofjustice/devsecops-actions/sca/slsa@a600477f79bedf31163091fad08150ab8b0b5be0

      - name: Install dependencies
        run: npm ci

      - name: Ingest content
        run: node scripts/ingest.mjs

      - name: Prepare GitHub App private key
        id: gh-app-key
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          raw_key='${{ secrets.DEV_PORTAL_GH_APP_PRIVATE_KEY }}'
          # Trim surrounding double-quotes if the secret was pasted quoted.
          raw_key="${raw_key#\"}"
          raw_key="${raw_key%\"}"

          # Handle multiline PEM and single-line values with literal \n.
          printf '%s' "$raw_key" | perl -pe 's/\\n/\n/g; s/\r$//' > gh-app-private-key.pem

          # If it is still not a PEM, try decoding as base64-encoded PEM.
          if ! grep -q 'BEGIN .*PRIVATE KEY' gh-app-private-key.pem; then
            printf '%s' "$raw_key" | tr -d '\r\n ' | base64 --decode > gh-app-private-key.pem 2>/dev/null || true
          fi

          if ! openssl pkey -in gh-app-private-key.pem -noout >/dev/null 2>&1; then
            echo "Invalid DEV_PORTAL_GH_APP_PRIVATE_KEY format. Provide a valid PEM private key (multiline PEM, escaped-newline PEM, or base64-encoded PEM)."
            exit 1
          fi
          delimiter="PRIVATE_KEY_$(openssl rand -hex 8)"
          {
            echo "private_key<<${delimiter}"
            cat gh-app-private-key.pem
            # Always place delimiter on its own line, even if key content lacks trailing newline.
            printf '\n%s\n' "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App token for catalog insights
        id: gh-app-token
        continue-on-error: true
        if: steps.gh-app-key.outcome == 'success'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v2
        with:
          app-id: ${{ secrets.DEV_PORTAL_GH_APP_ID }}
          private-key: ${{ steps.gh-app-key.outputs.private_key }}

      - name: Build (with GitHub App token)
        if: steps.gh-app-token.outcome == 'success' && steps.gh-app-token.outputs.token != ''
        env:
          GITHUB_TOKEN: ${{ steps.gh-app-token.outputs.token }}
        run: npm run build

      - name: Build (without GitHub App token)
        if: steps.gh-app-token.outcome != 'success' || steps.gh-app-token.outputs.token == ''
        run: npm run build

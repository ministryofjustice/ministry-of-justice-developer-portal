name: Ingest Preview (PR)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  preview-ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ vars.NODE_VERSION }} # Set in repo variables (Settings > Secrets and variables > Actions)
          cache: npm

      - name: SLSA supply chain protection
        uses: ministryofjustice/devsecops-actions/sca/slsa@9ec6779d39e07ca69ecf17baf5208a4b0095c10b # v1.6.0

      - name: Install dependencies
        run: npm ci

      - name: Ingest content
        run: node scripts/ingest.mjs

      - name: Build
        run: npm run build-no-catalog

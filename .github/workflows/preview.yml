name: Ingest Preview (PR)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  preview-ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.1.0
        with:
          node-version: ${{ vars.NODE_VERSION }} # Set in repo variables (Settings > Secrets and variables > Actions)
          cache: npm

      - name: SLSA supply chain protection
        uses: ministryofjustice/devsecops-actions/sca/slsa@a600477f79bedf31163091fad08150ab8b0b5be0

      - name: Install dependencies
        run: npm ci

      - name: Ingest content
        run: node scripts/ingest.mjs

      - name: Generate GitHub App token for catalog insights
        id: gh-app-token
        continue-on-error: true
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DEV_PORTAL_GH_APP_ID }}
          private-key: ${{ secrets.DEV_PORTAL_GH_APP_PRIVATE_KEY }}

      - name: Build (with GitHub App token)
        if: steps.gh-app-token.outcome == 'success' && steps.gh-app-token.outputs.token != ''
        env:
          GITHUB_TOKEN: ${{ steps.gh-app-token.outputs.token }}
        run: npm run build

      - name: Build (without GitHub App token)
        if: steps.gh-app-token.outcome != 'success' || steps.gh-app-token.outputs.token == ''
        run: npm run build

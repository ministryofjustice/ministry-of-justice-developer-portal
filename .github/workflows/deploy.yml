name: Ingest & Deploy

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      source:
        description: "Source ID to ingest (leave empty for all)"
        required: false
        type: string

  # Scheduled: every 6 hours
  schedule:
    - cron: "0 */6 * * *"

  # On push to main (for portal code changes)
  push:
    branches: [main]

  # Webhook: triggered by source repos via repository_dispatch
  repository_dispatch:
    types: [docs-update]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  ingest-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout portal repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.1.0
        with:
          node-version: ${{ vars.NODE_VERSION }} # Set in repo variables (Settings > Secrets and variables > Actions)
          cache: npm

      - name: SLSA supply chain protection
        uses: ministryofjustice/devsecops-actions/sca/slsa@d57d5793bf88b779875c8707e9b40a692b551b31

      - name: Install dependencies
        run: npm ci

      - name: Run ingestion pipeline
        run: |
          if [ -n "${{ github.event.inputs.source }}" ]; then
            node scripts/ingest.mjs "${{ github.event.inputs.source }}"
          elif [ -n "${{ github.event.client_payload.source_id }}" ]; then
            node scripts/ingest.mjs "${{ github.event.client_payload.source_id }}"
          else
            node scripts/ingest.mjs
          fi

      - name: Set GOV.UK assets path for GitHub Pages
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          sed -i "s|\$govuk-assets-path: \"/assets/\"|\$govuk-assets-path: \"/${REPO_NAME}/assets/\"|" styles/globals.scss

      - name: Build static site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: out

  deploy:
    needs: ingest-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

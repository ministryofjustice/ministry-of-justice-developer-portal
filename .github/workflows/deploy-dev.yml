name: Deploy to Dev
run-name: Deploy to Dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  IMAGE_TAG: ${{ github.sha }}

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy-dev:
    name: Build, Push, Deploy (Dev)
    runs-on: ubuntu-latest
    environment: dev
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate ECR configuration
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.DEV_ECR_ROLE_TO_ASSUME }}" ]]; then
            echo "Missing required secret: DEV_ECR_ROLE_TO_ASSUME"
            exit 1
          fi
          if [[ -z "${{ secrets.DEV_PORTAL_GH_APP_ID }}" ]]; then
            echo "Missing required secret: DEV_PORTAL_GH_APP_ID"
            exit 1
          fi
          if [[ -z "${{ secrets.DEV_PORTAL_GH_APP_PRIVATE_KEY }}" ]]; then
            echo "Missing required secret: DEV_PORTAL_GH_APP_PRIVATE_KEY"
            exit 1
          fi
          if [[ -z "${{ vars.ECR_REGION }}" ]]; then
            echo "Missing required variable: ECR_REGION"
            exit 1
          fi
          if [[ -z "${{ vars.ECR_REPOSITORY }}" ]]; then
            echo "Missing required variable: ECR_REPOSITORY"
            exit 1
          fi

      - name: Configure AWS credentials for ECR
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.DEV_ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@376925c9d111252e87ae59691e5a442dd100ef6a # v2

      - name: Prepare GitHub App private key
        id: gh-app-key
        shell: bash
        run: |
          set -euo pipefail
          raw_key='${{ secrets.DEV_PORTAL_GH_APP_PRIVATE_KEY }}'
          raw_key="${raw_key#\"}"
          raw_key="${raw_key%\"}"

          printf '%s' "$raw_key" | perl -pe 's/\\n/\n/g; s/\r$//' > gh-app-private-key.pem

          if ! grep -q 'BEGIN .*PRIVATE KEY' gh-app-private-key.pem; then
            printf '%s' "$raw_key" | tr -d '\r\n ' | base64 --decode > gh-app-private-key.pem 2>/dev/null || true
          fi

          if ! openssl pkey -in gh-app-private-key.pem -noout >/dev/null 2>&1; then
            echo "Invalid DEV_PORTAL_GH_APP_PRIVATE_KEY format. Provide a valid PEM private key (multiline PEM, escaped-newline PEM, or base64-encoded PEM)."
            exit 1
          fi
          delimiter="PRIVATE_KEY_$(openssl rand -hex 8)"
          {
            echo "private_key<<${delimiter}"
            cat gh-app-private-key.pem
            printf '\n%s\n' "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App token for catalog insights
        id: gh-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v2
        with:
          app-id: ${{ secrets.DEV_PORTAL_GH_APP_ID }}
          private-key: ${{ steps.gh-app-key.outputs.private_key }}
          owner: ${{ github.repository_owner }}

      - name: Restore catalog insights cache
        uses: actions/cache/restore@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4.0.2
        with:
          path: content/products/catalog_reports/
          key: catalog-insights-
          restore-keys: catalog-insights-

      - name: Build and push image
        id: build-push
        shell: bash
        env:
          GITHUB_TOKEN: ${{ steps.gh-app-token.outputs.token }}
        run: |
          set -euo pipefail
          IMAGE_URI="${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${IMAGE_TAG}"
          docker buildx build --platform linux/amd64 --load --secret id=github_token,env=GITHUB_TOKEN -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Setup kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4

      - name: Configure Kubernetes access
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.DEV_KUBE_CERT }}" > ca.crt
          kubectl config set-cluster cp-cluster --server="${{ secrets.DEV_KUBE_CLUSTER }}" --certificate-authority=ca.crt
          kubectl config set-credentials github-actions --token="${{ secrets.DEV_KUBE_TOKEN }}"
          kubectl config set-context dev --cluster=cp-cluster --user=github-actions --namespace="${{ secrets.DEV_KUBE_NAMESPACE }}"
          kubectl config use-context dev

      - name: Deploy manifests
        shell: bash
        run: |
          set -euo pipefail
          sed \
            -e "s|IMAGE_PLACEHOLDER|${{ steps.build-push.outputs.image_uri }}|g" \
            -e "s|^\([[:space:]]*namespace:\)[[:space:]]*.*$|\1 ${{ secrets.DEV_KUBE_NAMESPACE }}|" \
            k8s/dev/deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/developer-portal --namespace "${{ secrets.DEV_KUBE_NAMESPACE }}" --timeout=180s

      - name: Resolve smoke test target
        id: smoke-target
        shell: bash
        run: |
          set -euo pipefail
          APP_HOST="dev.developer-portal.service.justice.gov.uk"
          INGRESS_LB_HOST=$(kubectl get ingress developer-portal --namespace "${{ secrets.DEV_KUBE_NAMESPACE }}" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          RESOLVE_IP=$(getent ahostsv4 "${INGRESS_LB_HOST}" | awk 'NR==1{print $1}')

          echo "health_url=https://${APP_HOST}/healthz" >> "$GITHUB_OUTPUT"
          echo "resolve_ip=${RESOLVE_IP}" >> "$GITHUB_OUTPUT"

      - name: Smoke test
        shell: bash
        run: |
          bash scripts/smoke-test.sh dev "${{ steps.smoke-target.outputs.health_url }}" "${{ steps.smoke-target.outputs.resolve_ip }}"

name: Deploy to Prod
run-name: Deploy to Prod

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy-prod:
    name: Build, Push, Deploy (Prod)
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS credentials for ECR
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Keep this secret environment-scoped so dev/prod credentials never overlap.
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: build-push
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_URI="${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure Kubernetes access
        shell: bash
        run: |
          set -euo pipefail
          # Use Cloud Platform-provisioned PROD_* GitHub secrets.
          echo "${{ secrets.PROD_KUBE_CERT }}" | base64 --decode > ca.crt
          kubectl config set-cluster cp-cluster --server="${{ secrets.PROD_KUBE_CLUSTER }}" --certificate-authority=ca.crt
          kubectl config set-credentials github-actions --token="${{ secrets.PROD_KUBE_TOKEN }}"
          kubectl config set-context prod --cluster=cp-cluster --user=github-actions --namespace="${{ secrets.PROD_KUBE_NAMESPACE }}"
          kubectl config use-context prod

      - name: Deploy manifests
        shell: bash
        run: |
          set -euo pipefail
          sed "s|IMAGE_PLACEHOLDER|${{ steps.build-push.outputs.image_uri }}|g" k8s/prod/deployment.yaml | kubectl apply -f -
          kubectl rollout status deployment/developer-portal --namespace "${{ secrets.PROD_KUBE_NAMESPACE }}" --timeout=180s

      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail
          HTTP_CODE=$(curl -sS -o /tmp/prod-smoke.out -w "%{http_code}" https://developer-portal.service.justice.gov.uk/healthz)
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "Expected HTTP 200 from prod smoke test, got ${HTTP_CODE}"
            cat /tmp/prod-smoke.out
            exit 1
          fi
          if ! grep -Eq '^ok$' /tmp/prod-smoke.out; then
            echo "Unexpected prod smoke response body"
            cat /tmp/prod-smoke.out
            exit 1
          fi

name: Generate Catalog Insights

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-insights:
    name: Generate catalog insights
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.1.0
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Prepare GitHub App private key
        id: gh-app-key
        shell: bash
        run: |
          set -euo pipefail
          raw_key='${{ secrets.DEV_PORTAL_GH_APP_PRIVATE_KEY }}'
          raw_key="${raw_key#\"}"
          raw_key="${raw_key%\"}"

          printf '%s' "$raw_key" | perl -pe 's/\\n/\n/g; s/\r$//' > gh-app-private-key.pem

          if ! grep -q 'BEGIN .*PRIVATE KEY' gh-app-private-key.pem; then
            printf '%s' "$raw_key" | tr -d '\r\n ' | base64 --decode > gh-app-private-key.pem 2>/dev/null || true
          fi

          if ! openssl pkey -in gh-app-private-key.pem -noout >/dev/null 2>&1; then
            echo "Invalid DEV_PORTAL_GH_APP_PRIVATE_KEY format."
            exit 1
          fi
          delimiter="PRIVATE_KEY_$(openssl rand -hex 8)"
          {
            echo "private_key<<${delimiter}"
            cat gh-app-private-key.pem
            printf '\n%s\n' "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App token
        id: gh-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v2
        with:
          app-id: ${{ secrets.DEV_PORTAL_GH_APP_ID }}
          private-key: ${{ steps.gh-app-key.outputs.private_key }}
          owner: ${{ github.repository_owner }}

      - name: Generate catalog insights
        env:
          GITHUB_TOKEN: ${{ steps.gh-app-token.outputs.token }}
        run: npm run catalog:sync

      - name: Upload catalog insights artifact
        if: ${{ github.actor != 'nektos/act' }}
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: catalog-insights
          path: content/products/catalog_reports/
          retention-days: 30

      - name: Cache catalog insights
        if: ${{ github.actor != 'nektos/act' }}
        uses: actions/cache/save@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9 # v4.0.2
        with:
          path: content/products/catalog_reports/
          key: catalog-insights-${{ github.run_id }}

      - name: Skip artifact upload and cache when running under act
        if: ${{ github.actor == 'nektos/act' }}
        run: |
          echo "Running under act; skipping artifact upload and cache save."

      - name: Create pull request for refreshed catalog reports
        if: ${{ github.actor != 'nektos/act' }}
        uses: peter-evans/create-pull-request@4320041ed380b20e97d388d56a7fb4f9b8c20e79 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: catalog-refresh/${{ github.run_id }}
          base: main
          title: "chore(catalog): weekly catalog insights refresh"
          body: |
            ## Weekly catalog insights refresh

            This PR was automatically generated by the **Generate Catalog Insights** workflow.

            ### What changed
            - `content/products/catalog_reports/*.json` — refreshed catalog report data for all opted-in products
            - `content/products/catalog_reports/index.json` — updated summary index

            Review the generated data and merge when ready.
          commit-message: "chore(catalog): refresh catalog insights reports"
          labels: catalog,automated
          add-paths: content/products/catalog_reports/

      - name: Skip pull request creation when running under act
        if: ${{ github.actor == 'nektos/act' }}
        run: |
          echo "Running under act; skipping PR creation."
          echo "Generated files:"
          ls -lh content/products/catalog_reports/

name: Ingest Content
run-name: Ingest Content

on:
  workflow_dispatch:
    inputs:
      source_id:
        description: "Source ID to ingest (must match sources.json id; leave empty for all)"
        required: false
        type: string
      source:
        description: "Deprecated alias for source_id"
        required: false
        type: string

  schedule:
    - cron: "0 */6 * * *"

  repository_dispatch:
    types: [docs-update]

permissions:
  contents: write

concurrency:
  group: ingest-content
  cancel-in-progress: false

jobs:
  ingest:
    name: Ingest and Commit Content
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.1.0
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: npm

      - name: SLSA supply chain protection
        uses: ministryofjustice/devsecops-actions/sca/slsa@a600477f79bedf31163091fad08150ab8b0b5be0

      - name: Install dependencies
        shell: bash
        run: npm ci

      - name: Register self-service source
        id: register-self-service
        if: github.event_name == 'repository_dispatch' && github.event.client_payload.repo != ''
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_ID=$(node scripts/upsert-self-service-source.mjs "$GITHUB_EVENT_PATH")
          echo "source_id=${SOURCE_ID}" >> "$GITHUB_OUTPUT"
          echo "Registered/updated self-service source: ${SOURCE_ID}"

      - name: Run ingestion
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_ID="${{ steps.register-self-service.outputs.source_id || github.event.inputs.source_id || github.event.inputs.source || github.event.client_payload.source_id || '' }}"
          if [ -n "$SOURCE_ID" ]; then
            node scripts/ingest.mjs "$SOURCE_ID"
          else
            node scripts/ingest.mjs
          fi

      - name: Commit and push content updates
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No ingestion changes to commit"
            exit 0
          fi
          git commit -m "chore(ingest): refresh external documentation"
          git push

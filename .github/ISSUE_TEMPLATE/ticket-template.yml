name: "🎟️ Ticket Template"
description: "🛠️ Agreed standard template for creating tickets"
title: ""
labels: []
assignees: []

body:
  - type: dropdown
    id: team
    attributes:
      label: Team
      description: Select the team this issue belongs to.
      options:
        - Engineering Platform
        - Developer Portal
    validations:
      required: true

  - type: dropdown
    id: estimation
    attributes:
      label: "📊 Estimation"
      description: Estimate the effort required (story points or t-shirt size).
      options:
        - "1 - XS"
        - "2 - S"
        - "3 - M"
        - "5 - L"
        - "8 - XL"
        - "13 - XXL"
    validations:
      required: true

  - type: textarea
    id: ticket-details
    attributes:
      label: "📋 Ticket Details"
      description: Complete all sections below to describe the work needed.
      value: |
        ## 🧑‍💼 User Need
        **As a**
        **I want**
        **so that**

        ## 💡 Value / Purpose
        Describe the value of delivering this story. Does this link to OKRs?
        - 

        ## 🛠️ Description / Context
        What should the system do, and how should this be achieved?
        - 

        ## 🧪 Testing Steps
        What steps are needed to verify this works correctly?
        - [ ] 

        ## ✅ Definition of Done
        What conditions must be met before this story is considered complete?
        - [ ] Document the work completed in Developer Experience Team SharePoint
        - [ ] Acceptance criteria are met

        ## ❓ Additional Information
        Add any risks, mitigation, assumptions, or constraints.
        - 

        ## 📝 Notes
        Add any extra context, links, discussions, or implementation ideas.
        - 
    validations:
      required: true
